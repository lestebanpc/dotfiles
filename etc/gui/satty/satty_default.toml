#
# Vease 'https://github.com/Satty-org/Satty'
#

[general]

#fullscreen = true
#default-hide-toolbars = true
#corner-roundness = 8
#initial-tool = "pointer"

# Configure the command to be called on copy
copy-command = "wl-copy"

# Increase or decrease the size of the annotations
annotation-size-factor = 0.65

# Filename to use for saving action. Omit to disable saving to file.
# > Might contain format specifiers: https://docs.rs/chrono/latest/chrono/format/strftime/index.html
# > Can contain leading tilde (~) for home directory
output-filename = "~/images/screenshots/satty-%Y-%m-%d_%H:%M:%S.png"
#output-filename = "~/Pictures/screenshots/satty-%Y-%m-%d_%H:%M:%S.png"

# Actions to trigger on Enter key (order is important)
# > Possible values: save-to-clipboard, save-to-file, save-to-file-as, copy-filepath-to-clipboard, exit
actions-on-enter = ["save-to-clipboard"]
#actions-on-right-click = []
#actions-on-escape = ["exit"]

# Exit directly after some action.
early-exit = ["copy", "save", "save-as"]

#[font]
#family = "Inter"
#style = "Medium"
