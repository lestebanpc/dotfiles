##
## Kitty Keymappings
## > For debugging, run manually: 'kitty --debug-input'
## > A exepcion de los keymapping basicas, las demas usaran como leader a 'Alt + a'
## > Default keymappings:
##   kitty +runpy 'from kitty.config import *; print(commented_out_default_config())'
## > Info:
##   > Mappable actions   : https://sw.kovidgoyal.net/kitty/actions/
##   > Keyboard shortcuts : https://sw.kovidgoyal.net/kitty/conf/#keyboard-shortcuts
##



#------------------------------------------------------------------------
# Basic > General
#------------------------------------------------------------------------

# Font size
map ctrl+shift+minus     change_font_size all -1.0
map ctrl+plus            change_font_size all +1.0
map ctrl+shift+plus      change_font_size all +1.0
map ctrl+0               change_font_size all 0

# Clipboard: Copy and Paste
map ctrl+shift+v         paste_from_clipboard
map ctrl+shift+c         copy_to_clipboard

# Búsqueda en el todo el scrollback (por defecto usa como 'pager' a 'less')
map ctrl+shift+f         search_scrollback



#------------------------------------------------------------------------
# Basic> Scrollback
#------------------------------------------------------------------------

# Scrollback navigation> Next/Previous line
map ctrl+shift+up        scroll_line_up
map ctrl+shift+down      scroll_line_down

# Scrollback navigation> Next/Previous page
map shift+page_up        scroll_page_up
map shift+page_down      scroll_page_down

# Scrollback navigation> Previous/Next prompt
map ctrl+shift+z         scroll_to_prompt -1
map ctrl+shift+x         scroll_to_prompt 1

# Scrollback navigation> Begin/End scrollback
map shift+home           scroll_home
map shift+end            scroll_end

# Scrollback pager
#map alt+a>[              show_scrollback

# Clear terminal scrollback
#map alt+a>backspace      clear_terminal scrollback active



#------------------------------------------------------------------------
# Tabs (~ Tmux windows)
#------------------------------------------------------------------------

# New tab
map alt+a>c         launch --type=tab

# Next / previous tab
map alt+a>n         next_tab
map alt+a>p         previous_tab

# Rename current tab
map alt+a>,         set_tab_title

# Close current tab
map alt+a>&         close_tab

# Tabs navigation
map alt+a>1         goto_tab 1
map alt+a>2         goto_tab 2
map alt+a>3         goto_tab 3
map alt+a>4         goto_tab 4
map alt+a>5         goto_tab 5
map alt+a>6         goto_tab 6
map alt+a>7         goto_tab 7
map alt+a>8         goto_tab 8
map alt+a>9         goto_tab 9
map alt+a>0         goto_tab 10



#------------------------------------------------------------------------
# Windows (~ Tmux panel)
#------------------------------------------------------------------------

# New panel: Horizontal split (tmux equivalent: %)
map alt+a>minus     launch --location=hsplit
map alt+a>shift+%   launch --location=hsplit

# New panel: Vertical split (tmux equivalent: ")
map alt+a>=         launch --location=vsplit
map alt+a>shift+=   launch --location=vsplit
map alt+a>shift+"   launch --location=vsplit

# Panel navigations
map alt+a>h         neighboring_window left
map alt+a>j         neighboring_window down
map alt+a>k         neighboring_window up
map alt+a>l         neighboring_window right

# Move panel
map alt+a>shift+h   move_window left
map alt+a>shift+j   move_window down
map alt+a>shift+k   move_window up
map alt+a>shift+l   move_window right

# Enter resize mode
map alt+a>r         start_resizing_window

# Close current split/window
map alt+a>x         close_window

# Toggle maximize current window
map alt+a>z         toggle_layout stack



#------------------------------------------------------------------------
# General > Others
#------------------------------------------------------------------------

# Rotate window layout
map alt+a>space     next_layout

# Reload configuration
map alt+a>shift+r   load_config_file



#------------------------------------------------------------------------
# Quick access
#------------------------------------------------------------------------

