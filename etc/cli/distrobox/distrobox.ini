[fedora]
# Imagenes toolbox de Fedora
image="quay.io/fedora/fedora-toolbox:latest"

# Home a usar para el usuario por defecto de la distro
home="/dt1/distrobox/fedora"

# Paquetes a instalar despues de ejecutar el contenedor
additional_packages="util-linux shadow-utils which sudo python3-pip perl git openssl vim-enhanced rsync wl-clipboard tmux file make gcc gcc-c++ clang llvm llvm-devel openssl-devel"

# Volumen
volume="/dt3/code:/home/lucianoepc/code /dt3/works:/home/lucianoepc/works /dt3:/dt3 /dt9:/dt9"
#volume="$SSH_AUTH_SOCK:$SSH_AUTH_SOCK:Z"

# Variable de entorno
#additional_flags="--env TMUX_TMPDIR=/var/tmp"

# Comando post-instalación
#post_init_hook="vim --version"



